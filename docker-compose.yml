version: "3.9"

# ─────────────────────────────────────────
#   AI-POWERED SURVEILLANCE INTELLIGENCE
#   PLATFORM — Docker Compose
# ─────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ── PostgreSQL / TimescaleDB ──────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: asip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asip_secret}
      POSTGRES_DB: ${POSTGRES_DB:-surveillance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asip} -d ${POSTGRES_DB:-surveillance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - asip_net

  # ── MongoDB ───────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: asip_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-asip}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-asip_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-surveillance}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - asip_net

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: asip_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-asip_redis} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-asip_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - asip_net

  # ── Ollama (Local LLM) ────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: asip_ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU support — comment out if no NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    networks:
      - asip_net

  # ── Backend (FastAPI) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: asip_backend
    restart: unless-stopped
    command: sh -c "pip install --user bcrypt==4.0.1 && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --loop uvloop"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-asip}:${POSTGRES_PASSWORD:-asip_secret}@postgres:5432/${POSTGRES_DB:-surveillance}
      - MONGO_URL=mongodb://${MONGO_USER:-asip}:${MONGO_PASSWORD:-asip_secret}@mongo:27017/${MONGO_DB:-surveillance}?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/2
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-256bit}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - UPLOAD_DIR=/app/uploads
      - REPORTS_DIR=/app/reports
      - YOLO_MODEL=${YOLO_MODEL:-yolov8n.pt}
      - YOLO_CONFIDENCE=${YOLO_CONFIDENCE:-0.45}
      - FACE_RECOGNITION_THRESHOLD=${FACE_RECOGNITION_THRESHOLD:-0.65}
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/reports
      - ml_models:/app/ml_models
      - ./ml:/app/ml:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # GPU support for YOLOv8 + DeepFace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - asip_net

  # ── Celery Worker ─────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: asip_celery_worker
    restart: unless-stopped
    command: sh -c "pip install --user psycopg2-binary==2.9.9 bcrypt==4.0.1 && celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q video_processing,report_generation"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-asip}:${POSTGRES_PASSWORD:-asip_secret}@postgres:5432/${POSTGRES_DB:-surveillance}
      - MONGO_URL=mongodb://${MONGO_USER:-asip}:${MONGO_PASSWORD:-asip_secret}@mongo:27017/${MONGO_DB:-surveillance}?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/2
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - UPLOAD_DIR=/app/uploads
      - REPORTS_DIR=/app/reports
      - YOLO_MODEL=${YOLO_MODEL:-yolov8n.pt}
      - YOLO_CONFIDENCE=${YOLO_CONFIDENCE:-0.45}
      - FACE_RECOGNITION_THRESHOLD=${FACE_RECOGNITION_THRESHOLD:-0.65}
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/reports
      - ml_models:/app/ml_models
      - ./ml:/app/ml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # GPU support for ML inference
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging: *default-logging
    networks:
      - asip_net

  # ── Celery Beat (Scheduled Tasks) ─────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: asip_celery_beat
    restart: unless-stopped
    command: sh -c "pip install --user psycopg2-binary==2.9.9 bcrypt==4.0.1 && celery -A app.tasks.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-asip}:${POSTGRES_PASSWORD:-asip_secret}@postgres:5432/${POSTGRES_DB:-surveillance}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-asip_redis}@redis:6379/2
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./ml:/app/ml:ro
    logging: *default-logging
    networks:
      - asip_net

  # ── Frontend (React + Nginx) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asip_frontend
    restart: unless-stopped
    depends_on:
      - backend
    logging: *default-logging
    networks:
      - asip_net

  # ── Nginx Reverse Proxy ───────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: asip_nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    logging: *default-logging
    networks:
      - asip_net

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  ollama_data:
  uploads_data:
  reports_data:
  ml_models:

networks:
  asip_net:
    driver: bridge
